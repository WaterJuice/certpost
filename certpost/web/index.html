<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>certpost — Certificate Manager</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 { font-size: 20px; font-weight: 600; }
        header h1 span { color: var(--text-muted); font-weight: 400; }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px;
        }

        .section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 24px;
        }

        .section-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-header h2 { font-size: 16px; font-weight: 600; }
        .section-body { padding: 16px; }

        table { width: 100%; border-collapse: collapse; }

        th, td {
            text-align: left;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        tr:last-child td { border-bottom: none; }

        .status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-issued { background: rgba(63, 185, 80, 0.15); color: var(--green); }
        .status-pending { background: rgba(210, 153, 34, 0.15); color: var(--yellow); }
        .status-issuing { background: rgba(88, 166, 255, 0.15); color: var(--accent); }
        .status-error { background: rgba(248, 81, 73, 0.15); color: var(--red); }

        button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }

        button:hover { background: var(--accent-hover); }

        button.secondary {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 4px 10px;
            font-size: 12px;
        }

        button.secondary:hover { background: var(--border); }

        button.danger {
            background: transparent;
            color: var(--red);
            border: 1px solid var(--border);
            padding: 4px 10px;
            font-size: 12px;
        }

        button.danger:hover { background: rgba(248, 81, 73, 0.1); }

        input {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            width: 100%;
        }

        input:focus { outline: none; border-color: var(--accent); }

        .form-row {
            display: flex;
            gap: 12px;
            align-items: end;
        }

        .form-group { flex: 1; }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-weight: 500;
        }

        .token-cell {
            font-family: monospace;
            font-size: 13px;
            word-break: break-all;
            color: var(--accent);
        }

        .empty-state {
            text-align: center;
            padding: 32px;
            color: var(--text-muted);
        }

        .error-text { color: var(--red); font-size: 12px; }

        .actions { display: flex; gap: 6px; }

        /* Login screen */
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 57px);
        }

        .login-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 32px;
            width: 400px;
            max-width: 90vw;
        }

        .login-box h2 {
            margin-bottom: 16px;
            font-size: 18px;
        }

        .login-box .form-row { margin-top: 16px; }

        .login-error {
            color: var(--red);
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }

        #admin-screen { display: none; }
    </style>
</head>
<body>
    <header>
        <h1>certpost <span>certificate manager</span></h1>
        <div id="header-domain" style="color: var(--accent); font-size: 16px; font-weight: 500;"></div>
    </header>

    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-box">
            <h2>Admin Login</h2>
            <div class="form-group">
                <label>Admin Key</label>
                <input type="password" id="login-key" placeholder="Enter admin key" onkeydown="if(event.key==='Enter')doLogin()">
            </div>
            <div style="margin-top: 12px;">
                <label style="font-size: 14px; color: var(--text); cursor: pointer;">
                    <input type="checkbox" id="login-remember" style="width: auto; margin-right: 6px;">
                    Remember me
                </label>
            </div>
            <div class="form-row">
                <button onclick="doLogin()" style="width: 100%;">Login</button>
            </div>
            <div id="login-error" class="login-error">Invalid admin key</div>
        </div>
    </div>

    <!-- Admin Screen -->
    <div id="admin-screen">
        <div class="container">
            <div class="section">
                <div class="section-header">
                    <h2>Add Subdomain</h2>
                </div>
                <div class="section-body">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Subdomain</label>
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <input type="text" id="new-subdomain" placeholder="e.g. app or api.staging" style="flex: 1;">
                                <span id="domain-suffix" style="color: var(--text-muted); white-space: nowrap;"></span>
                            </div>
                        </div>
                        <div class="form-group" style="max-width: 200px;">
                            <label>IP Address</label>
                            <input type="text" id="new-ip" placeholder="e.g. 1.2.3.4" onkeydown="if(event.key==='Enter')addDomain()">
                        </div>
                        <div>
                            <button onclick="addDomain()">Add &amp; Issue</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <h2>Managed Domains</h2>
                </div>
                <div class="section-body">
                    <table>
                        <thead>
                            <tr>
                                <th>Domain</th>
                                <th>IP</th>
                                <th>Status</th>
                                <th>Expires</th>
                                <th>API Token</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="domains-table">
                            <tr><td colspan="6" class="empty-state">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Auth
        async function checkAuth() {
            const res = await api('GET', '/api/auth/check');
            if (res.authenticated) {
                showAdmin();
            }
        }

        async function doLogin() {
            const key = document.getElementById('login-key').value;
            const remember = document.getElementById('login-remember').checked;
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key, remember }),
            });
            if (res.ok) {
                document.getElementById('login-error').style.display = 'none';
                showAdmin();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function showAdmin() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-screen').style.display = 'block';
            loadBaseDomain();
            loadDomains();
        }

        // API helper
        async function api(method, path, body) {
            const opts = { method, headers: {} };
            if (body) {
                opts.headers['Content-Type'] = 'application/json';
                opts.body = JSON.stringify(body);
            }
            const res = await fetch(path, opts);
            return res.json();
        }

        // Format timestamp
        function formatDate(ts) {
            if (!ts) return '\u2014';
            // Handle ISO string or unix timestamp
            const d = typeof ts === 'string' ? new Date(ts) : new Date(ts * 1000);
            return d.toLocaleDateString('en-AU', {
                year: 'numeric', month: 'short', day: 'numeric'
            });
        }

        // Base domain
        async function loadBaseDomain() {
            const data = await api('GET', '/api/base-domain');
            const domain = data.base_domain || '';
            document.getElementById('header-domain').textContent = domain;
            document.getElementById('domain-suffix').textContent = domain ? '.' + domain : '';
        }

        // Domains
        async function loadDomains() {
            const data = await api('GET', '/api/domains');
            const tbody = document.getElementById('domains-table');
            if (!data.domains || data.domains.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No domains configured</td></tr>';
                return;
            }
            tbody.innerHTML = data.domains.map(d => {
                const enc = encodeURIComponent(d.subdomain);
                return `
                <tr>
                    <td>${d.subdomain}</td>
                    <td>
                        <span id="ip-display-${enc}">${d.ip_address || '\u2014'}</span>
                        <button class="secondary" onclick="editIp('${d.subdomain}')" style="margin-left: 4px;">Edit</button>
                    </td>
                    <td>
                        <span class="status status-${d.status}">${d.status}</span>
                        ${d.last_error ? '<br><span class="error-text">' + d.last_error + '</span>' : ''}
                    </td>
                    <td>${formatDate(d.cert_expires_at)}</td>
                    <td>
                        <span class="token-cell">${d.api_token || '\u2014'}</span>
                        ${d.api_token ? '<button class="secondary" onclick="copyToken(\'' + d.api_token + '\')" style="margin-left: 4px;">Copy</button>' : ''}
                    </td>
                    <td>
                        <div class="actions">
                            ${d.status === 'issued' ? '<button class="secondary" onclick="downloadCert(\'' + d.subdomain + '\', \'' + d.api_token + '\')">Download</button>' : ''}
                            <button class="secondary" onclick="rotateToken('${d.subdomain}')">Rotate Key</button>
                            <button class="danger" onclick="removeDomain('${d.subdomain}')">Remove</button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        async function addDomain() {
            const subInput = document.getElementById('new-subdomain');
            const ipInput = document.getElementById('new-ip');
            const subdomain = subInput.value.trim();
            const ip_address = ipInput.value.trim();
            if (!subdomain) return;
            if (!ip_address) { alert('Please enter an IP address.'); return; }
            await api('POST', '/api/domains', { subdomain, ip_address });
            subInput.value = '';
            ipInput.value = '';
            loadDomains();
        }

        async function removeDomain(subdomain) {
            if (!confirm('Remove ' + subdomain + ' and its DNS record?')) return;
            await api('DELETE', '/api/domains/' + encodeURIComponent(subdomain));
            loadDomains();
        }

        async function rotateToken(subdomain) {
            if (!confirm('Rotate API token for ' + subdomain + '? Existing clients will need the new token.')) return;
            await api('POST', '/api/domains/' + encodeURIComponent(subdomain) + '/rotate');
            loadDomains();
        }

        function copyToken(token) {
            navigator.clipboard.writeText(token);
        }

        async function editIp(subdomain) {
            const newIp = prompt('Enter new IP address for ' + subdomain + ':');
            if (!newIp) return;
            await api('POST', '/api/domains/' + encodeURIComponent(subdomain) + '/ip', { ip_address: newIp });
            loadDomains();
        }

        async function downloadCert(subdomain, token) {
            const res = await fetch('/api/cert/' + encodeURIComponent(subdomain), {
                headers: { 'Authorization': 'Bearer ' + token },
            });
            if (!res.ok) { alert('Failed to fetch certificate'); return; }
            const data = await res.json();
            // Download domain.crt and domain.key
            downloadFile(subdomain + '.crt', (data.cert_pem || '') + (data.chain_pem || ''));
            downloadFile(subdomain + '.key', data.key_pem || '');
        }

        function downloadFile(filename, content) {
            const blob = new Blob([content], { type: 'application/x-pem-file' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Auto-refresh domains every 5s
        setInterval(() => {
            if (document.getElementById('admin-screen').style.display !== 'none') {
                loadDomains();
            }
        }, 5000);

        // Check if already logged in
        checkAuth();
    </script>
</body>
</html>

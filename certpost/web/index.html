<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>certpost — Certificate Manager</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 { font-size: 20px; font-weight: 600; }
        header h1 span { color: var(--text-muted); font-weight: 400; }

        .container { max-width: 720px; margin: 0 auto; padding: 24px; }

        /* Cards */
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .card-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 14px;
        }

        .card-body { padding: 16px; }

        /* Domain card */
        .domain-card { position: relative; }

        .domain-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .domain-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 14px;
        }

        .meta-item label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .meta-item .value {
            font-size: 14px;
        }

        .token-row {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 14px;
        }

        .token-row code {
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 12px;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            min-width: 0;
        }

        .token-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .domain-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        /* Status badge */
        .badge {
            display: inline-block;
            padding: 1px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-issued { background: rgba(63, 185, 80, 0.15); color: var(--green); }
        .badge-pending { background: rgba(210, 153, 34, 0.15); color: var(--yellow); }
        .badge-issuing { background: rgba(88, 166, 255, 0.15); color: var(--accent); }
        .badge-error { background: rgba(248, 81, 73, 0.15); color: var(--red); }

        .error-text {
            color: var(--red);
            font-size: 12px;
            margin-top: 4px;
        }

        /* Buttons */
        button, .btn {
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            white-space: nowrap;
        }

        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }

        .btn-secondary {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-muted);
        }
        .btn-secondary:hover { background: var(--border); color: var(--text); }

        .btn-danger {
            background: transparent;
            color: var(--red);
            border: 1px solid var(--border);
        }
        .btn-danger:hover { background: rgba(248, 81, 73, 0.1); }

        .btn-sm { padding: 3px 10px; font-size: 12px; }

        /* Forms */
        input {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            width: 100%;
        }

        input:focus { outline: none; border-color: var(--accent); }

        .form-group { margin-bottom: 12px; }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-weight: 500;
        }

        .input-with-suffix {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-with-suffix input { flex: 1; }
        .input-with-suffix .suffix { color: var(--text-muted); white-space: nowrap; font-size: 14px; }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
            padding: 0 24px;
        }

        .tabs button {
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-muted);
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 0;
        }

        .tabs button:hover { color: var(--text); background: none; }
        .tabs button.active { color: var(--text); border-bottom-color: var(--accent); background: none; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Logs */
        .log-container {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            max-height: 500px;
            overflow-y: auto;
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 12px;
            line-height: 1.6;
        }

        .log-entry { color: var(--text-muted); }
        .log-entry .log-time { color: var(--text-muted); }
        .log-entry .log-source { color: var(--accent); }
        .log-entry .log-msg { color: var(--text); }

        /* Login */
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 57px);
        }

        .login-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 32px;
            width: 380px;
            max-width: 90vw;
        }

        .login-box h2 { margin-bottom: 20px; font-size: 18px; }

        .remember-row {
            margin: 12px 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-row input { width: auto; }
        .remember-row label { font-size: 14px; color: var(--text-muted); cursor: pointer; }

        .login-error { color: var(--red); font-size: 14px; margin-top: 12px; display: none; }

        #admin-screen { display: none; }

        .inline-edit {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .inline-edit button { vertical-align: middle; }

        /* Responsive */
        @media (max-width: 600px) {
            .domain-meta { grid-template-columns: 1fr; }
            .container { padding: 16px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>certpost <span>certificate manager</span></h1>
        <div style="display: flex; align-items: center; gap: 16px;">
            <div id="header-domain" style="color: var(--accent); font-size: 15px; font-weight: 500;"></div>
            <button id="logout-btn" class="btn btn-secondary btn-sm" onclick="doLogout()" style="display: none;">Logout</button>
        </div>
    </header>

    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-box">
            <h2>Admin Login</h2>
            <form onsubmit="event.preventDefault(); doLogin();" autocomplete="on">
                <div class="form-group">
                    <label for="login-key">Admin Key</label>
                    <input type="password" id="login-key" name="password" autocomplete="current-password" placeholder="Enter admin key">
                </div>
                <div class="remember-row">
                    <input type="checkbox" id="login-remember">
                    <label for="login-remember">Remember me</label>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
                <div id="login-error" class="login-error">Invalid admin key</div>
            </form>
        </div>
    </div>

    <!-- Admin Screen -->
    <div id="admin-screen">
        <div class="tabs">
            <button class="active" onclick="showTab('domains')">Domains</button>
            <button onclick="showTab('logs')">Logs</button>
        </div>

        <div id="tab-domains" class="tab-content active">
        <div class="container">

            <!-- Add subdomain -->
            <div class="card">
                <div class="card-header">Add Subdomain</div>
                <div class="card-body">
                    <div style="display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: end;">
                        <div>
                            <div class="form-group" style="margin-bottom: 8px;">
                                <label>Subdomain</label>
                                <div class="input-with-suffix">
                                    <input type="text" id="new-subdomain" placeholder="e.g. app">
                                    <span class="suffix" id="domain-suffix"></span>
                                </div>
                            </div>
                            <div class="form-group" style="margin-bottom: 0;">
                                <label>Target (IP address or CNAME)</label>
                                <input type="text" id="new-target" placeholder="e.g. 1.2.3.4 or host.example.com" onkeydown="if(event.key==='Enter')addDomain()">
                            </div>
                        </div>
                        <button class="btn btn-primary" onclick="addDomain()" style="height: 36px;">Add &amp; Issue</button>
                    </div>
                </div>
            </div>

            <!-- Domain list -->
            <div id="domains-list">
                <div class="empty-state">Loading...</div>
            </div>

        </div>
        </div>

        <div id="tab-logs" class="tab-content">
        <div class="container">
            <div class="card">
                <div class="card-header">Server Logs</div>
                <div class="card-body">
                    <div class="log-container" id="log-container">
                        <div class="empty-state">Loading...</div>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </div>

    <script>
        // Auth
        async function checkAuth() {
            const res = await api('GET', '/api/auth/check');
            if (res.authenticated) showAdmin();
        }

        async function doLogin() {
            const key = document.getElementById('login-key').value;
            const remember = document.getElementById('login-remember').checked;
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key, remember }),
            });
            if (res.ok) {
                document.getElementById('login-error').style.display = 'none';
                showAdmin();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function showAdmin() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-screen').style.display = 'block';
            document.getElementById('logout-btn').style.display = '';
            loadBaseDomain();
            loadDomains();
        }

        function doLogout() {
            document.cookie = 'certpost_session=; Path=/; Max-Age=0';
            document.getElementById('admin-screen').style.display = 'none';
            document.getElementById('logout-btn').style.display = 'none';
            document.getElementById('login-screen').style.display = '';
            document.getElementById('login-key').value = '';
        }

        function showTab(name) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + name).classList.add('active');
            event.target.classList.add('active');
            if (name === 'logs') loadLogs();
        }

        // API
        async function api(method, path, body) {
            const opts = { method, headers: {} };
            if (body) {
                opts.headers['Content-Type'] = 'application/json';
                opts.body = JSON.stringify(body);
            }
            const res = await fetch(path, opts);
            return res.json();
        }

        function formatDate(ts) {
            if (!ts) return '\u2014';
            const d = typeof ts === 'string' ? new Date(ts) : new Date(ts * 1000);
            return d.toLocaleDateString('en-AU', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        // Base domain
        async function loadBaseDomain() {
            const data = await api('GET', '/api/base-domain');
            const domain = data.base_domain || '';
            document.getElementById('header-domain').textContent = domain;
            document.getElementById('domain-suffix').textContent = domain ? '.' + domain : '';
        }

        // Domains
        async function loadDomains() {
            const data = await api('GET', '/api/domains');
            const container = document.getElementById('domains-list');

            if (!data.domains || data.domains.length === 0) {
                container.innerHTML = '<div class="empty-state">No domains configured yet.</div>';
                return;
            }

            container.innerHTML = data.domains.map(d => {
                const enc = encodeURIComponent(d.subdomain);
                const hasError = d.last_error ? `<div class="error-text">${d.last_error}</div>` : '';
                const downloadBtn = d.status === 'issued'
                    ? `<button class="btn btn-secondary btn-sm" onclick="downloadCert('${d.subdomain}', '${d.api_token}')">Download</button>`
                    : '';

                return `
                <div class="card domain-card">
                    <div class="card-body">
                        <div class="domain-name">
                            ${d.subdomain}
                            <span class="badge badge-${d.status}">${d.status}</span>
                        </div>
                        ${hasError}
                        <div class="domain-meta">
                            <div class="meta-item">
                                <label>Target</label>
                                <div class="value inline-edit">
                                    ${d.target || '\u2014'}
                                    <button class="btn btn-secondary btn-sm" onclick="editTarget('${d.subdomain}')">Edit</button>
                                </div>
                            </div>
                            <div class="meta-item">
                                <label>Expires</label>
                                <div class="value">${formatDate(d.cert_expires_at)}</div>
                            </div>
                        </div>
                        <div class="token-row">
                            <code id="token-${enc}">${d.api_token ? (_revealedTokens.has(enc) ? d.api_token : maskToken(d.api_token)) : '\u2014'}</code>
                            <div class="token-actions">
                                <button class="btn btn-secondary btn-sm" id="reveal-${enc}" onclick="toggleToken('${enc}', '${d.api_token}')">${_revealedTokens.has(enc) ? 'Hide' : 'Show'}</button>
                                <button class="btn btn-secondary btn-sm" onclick="copyToken('${d.api_token}')">Copy</button>
                                <button class="btn btn-secondary btn-sm" onclick="rotateToken('${d.subdomain}')">Rotate</button>
                            </div>
                        </div>
                        <div class="domain-actions">
                            ${downloadBtn}
                            <button class="btn btn-danger btn-sm" onclick="removeDomain('${d.subdomain}')">Remove</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        async function addDomain() {
            const subInput = document.getElementById('new-subdomain');
            const targetInput = document.getElementById('new-target');
            const subdomain = subInput.value.trim();
            const target = targetInput.value.trim();
            if (!subdomain) return;
            if (!target) { alert('Please enter an IP address or CNAME target.'); return; }
            await api('POST', '/api/domains', { subdomain, target });
            subInput.value = '';
            targetInput.value = '';
            loadDomains();
        }

        async function removeDomain(subdomain) {
            if (!confirm('Remove ' + subdomain + ' and its DNS record?')) return;
            await api('DELETE', '/api/domains/' + encodeURIComponent(subdomain));
            loadDomains();
        }

        async function rotateToken(subdomain) {
            if (!confirm('Rotate API token for ' + subdomain + '?\nExisting clients will need the new token.')) return;
            await api('POST', '/api/domains/' + encodeURIComponent(subdomain) + '/rotate');
            loadDomains();
        }

        const _revealedTokens = new Set();

        function maskToken(token) {
            const show = 4;
            return token.slice(0, show) + '*'.repeat(token.length - show);
        }

        function toggleToken(enc, token) {
            const el = document.getElementById('token-' + enc);
            const btn = document.getElementById('reveal-' + enc);
            if (btn.textContent === 'Show') {
                el.textContent = token;
                btn.textContent = 'Hide';
                _revealedTokens.add(enc);
            } else {
                el.textContent = maskToken(token);
                btn.textContent = 'Show';
                _revealedTokens.delete(enc);
            }
        }

        function copyToken(token) {
            const ta = document.createElement('textarea');
            ta.value = token;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
        }

        async function editTarget(subdomain) {
            const newTarget = prompt('New target (IP address or CNAME) for ' + subdomain + ':');
            if (!newTarget) return;
            await api('POST', '/api/domains/' + encodeURIComponent(subdomain) + '/target', { target: newTarget });
            loadDomains();
        }

        async function downloadCert(subdomain, token) {
            const res = await fetch('/api/cert/' + encodeURIComponent(subdomain), {
                headers: { 'Authorization': 'Bearer ' + token },
            });
            if (!res.ok) { alert('Failed to fetch certificate'); return; }
            const data = await res.json();

            // Download .crt first, then .key after a short delay so browser allows both
            downloadFile(subdomain + '.crt', (data.cert_pem || '') + (data.chain_pem || ''));
            setTimeout(() => {
                downloadFile(subdomain + '.key', data.key_pem || '');
            }, 500);
        }

        function downloadFile(filename, content) {
            const blob = new Blob([content], { type: 'application/x-pem-file' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
        }

        // Logs
        async function loadLogs() {
            const data = await api('GET', '/api/logs');
            const container = document.getElementById('log-container');
            if (!data.entries || data.entries.length === 0) {
                container.innerHTML = '<div class="empty-state">No log entries yet.</div>';
                return;
            }
            container.innerHTML = data.entries.map(e => {
                const time = e.timestamp ? e.timestamp.split('T')[1].split('.')[0] : '';
                const date = e.timestamp ? e.timestamp.split('T')[0] : '';
                return `<div class="log-entry"><span class="log-time">${date} ${time}</span> <span class="log-source">[${e.source}]</span> <span class="log-msg">${e.message}</span></div>`;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        // Auto-refresh
        setInterval(() => {
            if (document.getElementById('admin-screen').style.display !== 'none') {
                loadDomains();
                if (document.getElementById('tab-logs').classList.contains('active')) loadLogs();
            }
        }, 5000);

        checkAuth();
    </script>
</body>
</html>
